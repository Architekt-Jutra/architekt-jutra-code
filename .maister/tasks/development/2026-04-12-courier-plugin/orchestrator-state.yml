    research_question: "How to add a new UI plugin to the aj platform?"
    research_type: technical
    confidence_level: high
  phase_summaries:
    research:
      summary: "The aj platform uses a micro-frontend plugin model: plugins are standalone web apps loaded via sandboxed iframes, registered via PUT /api/plugins/{id}/manifest. The Plugin SDK (window.PluginSDK) is loaded from the host and provides thisPlugin (context, data, objects) and hostApp (products, fetch) APIs via postMessage. Key extension points: menu.main (sidebar), product.detail.tabs (600px tab), product.detail.info (60px strip), product.list.filters. Data storage: per-product JSON blob or structured plugin objects. Critical known gap: PluginDescriptor.java missing Lombok annotations blocks all data APIs."
      key_findings:
        - "Plugin registration via PUT /api/plugins/{id}/manifest (upsert)"
        - "SDK loaded from host: <script src='http://localhost:8080/assets/plugin-sdk.js'>"
        - "Context injected via window.name (iframe.name set before iframe.src)"
        - "thisPlugin.objects.* API for structured multi-record storage"
        - "PluginDescriptor.java missing @Getter @Setter @NoArgsConstructor — must fix first"
      recommended_approach: "Build React/TypeScript plugin app, fix PluginDescriptor.java Lombok gap, register via manifest API"
